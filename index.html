    function renderWorkoutSelect(program) {
      return `
        <div class="workout-select animate-scale">
          <div class="select-title">
            <h2><span style="color:white">IRON</span><span style="color:var(--accent)">KANG</span></h2>
            <p>Select Training Split</p>
          </div>
          ${Object.entries(program.days).map(([key, day]) => `
            <div class="workout-option" onclick="state.currentDay='${key}';startWorkout();">
              <div>
                <h3>${day.name}</h3>
                <p>${day.exercises.length} Exercises • ${day.subtitle}</p>
              </div>
              <div class="workout-indicator"><div class="indicator-dot"></div></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderStatsView(program) {
      const totalVolume = userData.history.reduce((acc, h) => acc + (h.newWeight || 0), 0) * 10; // Rough estimate
      const completed = userData.completedWorkouts || [];
      const thisMonth = completed.filter(d => d.startsWith(`${state.calendarYear}-${String(state.calendarMonth + 1).padStart(2, '0')}`)).length;
      const streak = getStreak();

      // Chart data - last 7 sessions
      const recentHistory = [...userData.history].reverse().slice(0, 20);
      const volumeByDay = {};
      recentHistory.forEach(h => {
        const day = getDateKey(new Date(h.date));
        volumeByDay[day] = (volumeByDay[day] || 0) + (h.newWeight || 0);
      });
      const chartDays = Object.entries(volumeByDay).slice(-7);
      const maxVol = Math.max(...chartDays.map(([, v]) => v), 1);

      // Exercise progress
      const exerciseIds = [...new Set(userData.history.map(h => h.exerciseId))];
      const allExercises = Object.values(program.days).flatMap(d => d.exercises);

      let html = `
        <div class="animate-fade">
          <div class="stat-card">
            <div class="stat-label">Lifetime Volume</div>
            <div class="stat-value">${Math.round(totalVolume / 1000)}K</div>
            <div class="stat-unit">Pounds Lifted</div>
          </div>

          <div class="stats-grid">
            <div class="mini-stat">
              <div class="mini-stat-value">${thisMonth}</div>
              <div class="mini-stat-label">This Month</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-value">${streak}</div>
              <div class="mini-stat-label">Day Streak</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-value">${completed.length}</div>
              <div class="mini-stat-label">Total Sessions</div>
            </div>
          </div>

          <div class="calendar">
            <div class="calendar-header">
              <div class="calendar-title">${['January','February','March','April','May','June','July','August','September','October','November','December'][state.calendarMonth]} ${state.calendarYear}</div>
              <div class="calendar-nav">
                <button onclick="changeMonth(-1)">←</button>
                <button onclick="changeMonth(1)">→</button>
              </div>
            </div>
            <div class="calendar-grid">
              ${['S','M','T','W','T','F','S'].map(d => `<div class="calendar-day-label">${d}</div>`).join('')}
              ${renderCalendarDays()}
            </div>
            ${state.selectedCalendarDate ? renderSelectedWorkout() : ''}
          </div>

          ${chartDays.length > 1 ? `
          <div class="chart-card">
            <div class="chart-title"><div class="chart-dot"></div> Weekly Volume</div>
            <div class="chart-bars">
              ${chartDays.map(([day, vol]) => `
                <div class="chart-bar-wrap">
                  <div class="chart-bar" style="height:${(vol / maxVol) * 100}%"></div>
                  <div class="chart-bar-label">${new Date(day).toLocaleDateString(undefined, { weekday: 'short' })}</div>
                </div>
              `).join('')}
            </div>
          </div>
          ` : ''}

          ${Object.keys(userData.prs || {}).length > 0 ? `
          <div class="chart-card">
            <div class="chart-title"><div class="chart-dot" style="background:var(--gold)"></div> Personal Records</div>
            ${Object.entries(userData.prs).map(([id, weight]) => {
              const ex = allExercises.find(e => e.id === id);
              return ex ? `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:12px;"><span style="color:var(--text-secondary)">${ex.name}</span><span style="color:var(--gold);font-weight:800">${weight} lb 🏆</span></div>` : '';
            }).join('')}
          </div>
          ` : ''}
        </div>
      `;

      return html;
    }

    function renderCalendarDays() {
      const y = state.calendarYear, m = state.calendarMonth;
      const firstDay = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const todayKey = getDateKey();
      const completed = userData.completedWorkouts || [];

      let html = '';
      for (let i = 0; i < firstDay; i++) html += `<div class="calendar-day"></div>`;
      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = `${y}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isToday = dateKey === todayKey;
        const isComplete = completed.includes(dateKey);
        const isSelected = state.selectedCalendarDate === dateKey;
        const clickHandler = isComplete ? `onclick="selectCalendarDate('${dateKey}')"` : '';
        html += `<div class="calendar-day current ${isToday ? 'today' : ''} ${isComplete ? 'completed' : ''} ${isSelected ? 'selected' : ''}" ${clickHandler}>${day}</div>`;
      }
      return html;
    }

    function selectCalendarDate(dateKey) {
      state.selectedCalendarDate = state.selectedCalendarDate === dateKey ? null : dateKey;
      render();
    }

    function getWorkoutsForDate(dateKey) {
      // Lazy load sessions only when needed - return ALL workouts for date
      const sessions = loadSessions(state.profile);
      return sessions.filter(s => s.dateKey === dateKey);
    }

    function renderSelectedWorkout() {
      const workouts = getWorkoutsForDate(state.selectedCalendarDate);
      if (!workouts || workouts.length === 0) {
        return `<div class="calendar-workout"><p style="color:var(--text-muted);font-size:12px;">No workout data found for this date.</p></div>`;
      }
      
      return workouts.map(workout => `
        <div class="calendar-workout animate-slide-down" style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div>
              <div style="font-size:14px;font-weight:900;text-transform:uppercase;">${workout.dayName}</div>
              <div style="font-size:10px;color:var(--text-muted);">${formatDate(workout.date)}</div>
            </div>
            <div style="font-size:11px;color:var(--accent);font-weight:700;">${workout.totalSets} sets • ${(workout.totalVolume || 0).toLocaleString()} lb</div>
          </div>
          ${workout.exercises.map(ex => `
            <div style="padding:10px 0;border-top:1px solid var(--border-light);">
              <div style="font-size:12px;font-weight:800;margin-bottom:6px;">${ex.name}</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px;">
                ${ex.sets.map((s, i) => `
                  <div style="background:rgba(0,0,0,0.3);border:1px solid var(--border);padding:4px 8px;border-radius:6px;font-size:10px;">
                    <span style="color:var(--accent);font-weight:700;">${i+1}</span> ${s.weight}×${s.reps}
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function renderHistoryView() {
      // Lazy load sessions only when viewing History tab
      const sessions = loadSessions(state.profile);
      
      if (sessions.length === 0) {
        return `
          <div class="empty-state animate-fade">
            <div class="empty-icon">📜</div>
            <div class="empty-title">No History Yet</div>
            <div class="empty-desc">Complete workouts to see your sessions</div>
          </div>
        `;
      }

      // Undo card for progressions
      const lastEntry = userData.history[userData.history.length - 1];
      let html = `<div class="animate-fade">`;
      
      if (lastEntry) {
        html += `
          <div class="undo-card">
            <div class="undo-info">
              <span class="undo-label">Last Progression</span>
              ${lastEntry.exerciseName} → ${lastEntry.newWeight} lb
            </div>
            <button class="undo-btn" onclick="undoLastProgression()">↩ Undo</button>
          </div>
        `;
      }

      html += `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h2 style="font-size:28px;font-weight:900;letter-spacing:-1px;">History</h2>
          <span style="font-size:11px;color:var(--text-muted);font-weight:700;">${sessions.length} sessions</span>
        </div>
      `;

      sessions.slice(0, 20).forEach(session => {
        const isExpanded = state.expandedHistory === session.id;
        
        // Calculate volume from sets if not stored
        let volume = session.totalVolume || 0;
        if (!volume && session.exercises) {
          session.exercises.forEach(ex => {
            ex.sets.forEach(s => {
              volume += (s.weight || 0) * (s.reps || 0);
            });
          });
        }

        html += `
          <div class="history-card">
            <div class="history-header" onclick="toggleHistory('${session.id}')">
              <div>
                <div class="history-title">${session.dayName}</div>
                <div class="history-date">${formatDate(session.date)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="history-badge">${session.totalSets || session.exercises?.reduce((a, e) => a + e.sets.length, 0) || 0} sets</div>
                <span class="history-arrow ${isExpanded ? 'open' : ''}">▼</span>
              </div>
            </div>
            ${isExpanded ? `
              <div class="history-detail animate-slide-down">
                ${session.exercises.map(ex => `
                  <div class="history-exercise">
                    <div class="history-ex-name">${ex.name}</div>
                    <div class="history-sets">
                      ${ex.sets.map((s, i) => `
                        <div class="history-set">
                          <span style="color:var(--accent);font-weight:800;">${i + 1}</span>
                          <span style="margin-left:6px;">${s.weight}lb × ${s.reps}</span>
                        </div>
                      `).join('')}
                    </div>
                  </div>
                `).join('')}
                <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-light);display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);">
                  <span>Total Volume</span>
                  <span style="font-weight:800;color:var(--accent);">${volume.toLocaleString()} lb</span>
                </div>
              </div>
            ` : ''}
          </div>
        `;
      });

      html += `</div>`;
      return html;
    }

    function renderSettingsView() {
      const danielCore = loadCoreData('daniel');
      const beatrizCore = loadCoreData('beatriz');
      const danielSessions = loadSessions('daniel');
      const beatrizSessions = loadSessions('beatriz');
      const dStats = { ex: Object.keys(danielCore.progressions).length, sessions: danielSessions.length };
      const bStats = { ex: Object.keys(beatrizCore.progressions).length, sessions: beatrizSessions.length };
      const backupDays = getLastBackupDays();
      const backupStatus = backupDays > 30 ? 'danger' : backupDays > 7 ? 'warning' : 'good';

      return `
        <div class="settings-section animate-fade">
          <div class="section-title">Quick Backup</div>
          <div class="backup-card ${backupStatus}">
            <div class="backup-header">
              <span class="backup-title">📋 Backup Link</span>
              <span class="backup-status">${backupDays > 100 ? 'Never' : backupDays === 0 ? 'Today' : backupDays + ' days ago'}</span>
            </div>
            <p class="backup-desc">Creates a link with all your data. Save it anywhere — survives cache clears!</p>
            <button class="backup-btn primary full" onclick="copyBackupLink()">📋 Copy Backup Link</button>
          </div>

          <div class="section-title" style="margin-top:24px;">File Backup</div>
          
          <div class="backup-card">
            <div class="backup-header">
              <span class="backup-title">Daniel</span>
              <span class="backup-status">${dStats.ex} exercises • ${dStats.sessions} progressions</span>
            </div>
            <div class="backup-btns">
              <button class="backup-btn primary" onclick="exportData('daniel')">📤 Export</button>
              <button class="backup-btn secondary" onclick="document.getElementById('import-d').click()">📥 Import</button>
              <input type="file" id="import-d" accept=".json" style="display:none" onchange="importData(event,'daniel')">
            </div>
          </div>

          <div class="backup-card">
            <div class="backup-header">
              <span class="backup-title">Beatriz</span>
              <span class="backup-status">${bStats.ex} exercises • ${bStats.sessions} progressions</span>
            </div>
            <div class="backup-btns">
              <button class="backup-btn primary" onclick="exportData('beatriz')">📤 Export</button>
              <button class="backup-btn secondary" onclick="document.getElementById('import-b').click()">📥 Import</button>
              <input type="file" id="import-b" accept=".json" style="display:none" onchange="importData(event,'beatriz')">
            </div>
          </div>

          <div class="backup-card">
            <div class="backup-header">
              <span class="backup-title">All Data</span>
              <span class="backup-status">Both profiles</span>
            </div>
            <div class="backup-btns">
              <button class="backup-btn primary" onclick="exportAllData()">📤 Export All</button>
              <button class="backup-btn secondary" onclick="document.getElementById('import-all').click()">📥 Import All</button>
              <input type="file" id="import-all" accept=".json" style="display:none" onchange="importAllData(event)">
            </div>
          </div>

          <div style="background:var(--bg-card);border-radius:14px;padding:14px;margin:20px 0;font-size:11px;color:var(--text-secondary);line-height:1.6;">
            <strong>Restore from link:</strong> Paste backup link in browser<br>
            <strong>Restore from file:</strong> Tap Import → select file
          </div>

          <div class="section-title" style="margin-top:24px;color:#ef4444;">Danger Zone</div>
          <button class="backup-btn danger full" onclick="clearAllData()">🗑️ Clear All Data</button>
        </div>
      `;
    }

    function renderModal() {
      const { totalSets, totalVolume, prsHit } = state.modalData;
      return `
        <div class="modal-overlay" onclick="closeModal()">
          <div class="modal" onclick="event.stopPropagation()">
            <h2>💪 Workout Complete!</h2>
            <div class="modal-stats">
              <div class="modal-stat">
                <div class="modal-stat-value">${totalSets}</div>
                <div class="modal-stat-label">Sets</div>
              </div>
              <div class="modal-stat">
                <div class="modal-stat-value">${Math.round(totalVolume / 1000)}k</div>
                <div class="modal-stat-label">Volume</div>
              </div>
              <div class="modal-stat">
                <div class="modal-stat-value">${prsHit.length}</div>
                <div class="modal-stat-label">PRs</div>
              </div>
            </div>
            ${prsHit.length > 0 ? `
              <div class="modal-prs">
                <h3>🏆 New Personal Records!</h3>
                <ul style="list-style:none;">
                  ${prsHit.map(pr => `<li>${pr.name}: ${pr.weight} lb</li>`).join('')}
                </ul>
              </div>
            ` : ''}
            <button class="modal-btn" onclick="closeModal()">Done</button>
          </div>
        </div>
      `;
    }

    function addSet(exerciseId) {
      const program = PROGRAMS[state.profile];
      let exercise = null;
      for (const day of Object.values(program.days)) {
        exercise = day.exercises.find(e => e.id === exerciseId);
        if (exercise) break;
      }
      if (!exercise) return;
      
      // Find next set index
      const sets = state.currentSets[exerciseId] || {};
      const nextIdx = Math.max(...Object.keys(sets).map(Number), exercise.sets - 1) + 1;
      const weight = getCurrentWeight(exercise);
      
      if (!state.currentSets[exerciseId]) state.currentSets[exerciseId] = {};
      state.currentSets[exerciseId][nextIdx] = { weight, reps: 0, done: false };
      saveSession();
      render();
    }

    function addNewExercise() {
      showToast('Custom exercises coming soon!');
    }

    // ============== INIT ==============
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    checkForBackupInUrl();
    if (getLastBackupDays() >= 7) state.showBackupReminder = true;
    render();
  </script>
</body>
</html>
